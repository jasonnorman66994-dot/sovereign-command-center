name: Quality Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  quick-smoke:
    name: Quick Smoke Check
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare local tooling
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          npm install -g markdownlint-cli2

      - name: Run smoke check (Quick)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\smoke_check.ps1 -Mode Quick

  full-smoke:
    name: Full Smoke Check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare local tooling
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          npm install -g markdownlint-cli2

      - name: Run smoke check (Full)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\smoke_check.ps1 -Mode Full
